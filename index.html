<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jarvis v2.5</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #001f3f, #000814);
      color: #00d4ff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 80px;
      font-size: 60px;
      letter-spacing: 5px;
      text-shadow: 0 0 25px #00d4ff;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
      opacity: 0.8;
    }

    .circle {
      width: 220px;
      height: 220px;
      border: 4px solid #00d4ff;
      border-radius: 50%;
      margin: 60px auto;
      box-shadow: 0 0 50px #00d4ff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .log {
      margin-top: 30px;
      font-size: 16px;
      opacity: 0.7;
      max-width: 600px;
      margin: auto;
    }
  </style>

</head>

<body>

<h1>JARVIS</h1>
<div class="circle"></div>
<div id="status">Waiting for "Hey Jarvis"...</div>
<div class="log" id="log"></div>

<script>
const status = document.getElementById("status");
const log = document.getElementById("log");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();

recognition.continuous = true;
recognition.lang = "en-US";

let activated = false;
let lastTranscript = "";
let lastTime = 0;

// 🎤 Start
recognition.onstart = () => {
  status.innerText = "Jarvis is online...";
};

// 🎧 Listen
recognition.onresult = (event) => {
  let transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

  // 🚫 IGNORE duplicates (super important fix)
  const now = Date.now();
  if (transcript === lastTranscript && (now - lastTime) < 2000) return;

  lastTranscript = transcript;
  lastTime = now;

  log.innerHTML = "<p>You: " + transcript + "</p>";

  console.log("Heard:", transcript);

  // 🔑 Wake word
  if (!activated && transcript.includes("hey jarvis")) {
    activated = true;
    speak("Yes.");
    status.innerText = "Listening...";
    return;
  }

  // 🎯 Command mode
  if (activated) {
    handleCommand(transcript);
    activated = false;
    status.innerText = "Waiting for 'Hey Jarvis'...";
  }
};

// 🔁 Restart if stopped
recognition.onend = () => recognition.start();

recognition.onerror = (event) => {
  console.error("Error:", event.error);
};

recognition.start();

// 🧠 COMMAND SYSTEM
function handleCommand(command) {

  // CLEAN command
  command = command.replace("hey jarvis", "").trim();

  // 🌐 OPEN SITES
  if (command.includes("youtube")) {
    speak("Opening YouTube.");
    window.open("https://www.youtube.com", "_blank");
  }

  else if (command.includes("google")) {
    speak("Opening Google.");
    window.open("https://www.google.com", "_blank");
  }

  else if (command.includes("spotify")) {
    speak("Opening Spotify.");
    window.open("https://open.spotify.com", "_blank");
  }

  // ⏰ TIME
  else if (command.includes("time")) {
    const time = new Date().toLocaleTimeString();
    speak("The time is " + time);
  }

  // 📅 DATE
  else if (command.includes("date")) {
    const date = new Date().toLocaleDateString();
    speak("Today is " + date);
  }

  // 💬 SMALL TALK
  else if (command.includes("how are you")) {
    speak("I am fully operational, sir.");
  }

  else if (command.includes("who are you")) {
    speak("I am Jarvis, your personal assistant.");
  }

  // 🧠 FALLBACK
  else {
    speak(smartResponse(command));
  }
}

// 🤖 SMART RESPONSE
function smartResponse(input) {

  if (input.includes("hello")) return "Hello, sir.";
  if (input.includes("help")) return "Try saying open YouTube or ask for the time.";

  return "I did not understand that command.";
}

// 🔊 VOICE
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const jarvisVoice =
    voices.find(v => v.name.includes("Google UK English Male")) ||
    voices.find(v => v.lang === "en-GB") ||
    voices[0];

  if (jarvisVoice) speech.voice = jarvisVoice;

  speech.pitch = 0.85;
  speech.rate = 0.95;

  speechSynthesis.cancel(); // 🧠 STOP overlap (important fix)
  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
