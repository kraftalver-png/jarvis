<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis v2.6 FIXED</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #001f3f, #000814);
  color: #00d4ff;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 80px;
  font-size: 60px;
  text-shadow: 0 0 20px #00d4ff;
}

#status {
  margin-top: 20px;
  font-size: 20px;
}

.circle {
  width: 200px;
  height: 200px;
  border: 4px solid #00d4ff;
  border-radius: 50%;
  margin: 50px auto;
  box-shadow: 0 0 40px #00d4ff;
}

.log {
  margin-top: 20px;
  opacity: 0.7;
}
</style>

</head>

<body>

<h1>JARVIS</h1>
<div class="circle"></div>
<div id="status">Click anywhere to start</div>
<div class="log" id="log"></div>

<script>
const status = document.getElementById("status");
const log = document.getElementById("log");

let recognition;
let activated = false;
let listeningForCommand = false;

// ⚠️ MUST CLICK TO START (browser security)
document.body.onclick = startJarvis;

function startJarvis() {

  status.innerText = "Starting...";

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    status.innerText = "Speech Recognition not supported";
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.lang = "en-US";

  recognition.onstart = () => {
    status.innerText = "Say 'Hey Jarvis'";
  };

  recognition.onresult = (event) => {
    const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();

    log.innerHTML = "<p>You: " + transcript + "</p>";
    console.log(transcript);

    // 🔑 Wake word
    if (!activated && transcript.includes("hey jarvis")) {
      activated = true;
      listeningForCommand = true;

      speak("Yes.");
      status.innerText = "Listening for command...";

      // ⏳ Give you time to speak
      setTimeout(() => {
        listeningForCommand = false;
      }, 5000);

      return;
    }

    // 🎯 Command mode
    if (activated && listeningForCommand) {
      handleCommand(transcript);
      activated = false;
      listeningForCommand = false;
      status.innerText = "Say 'Hey Jarvis'";
    }
  };

  recognition.onerror = (e) => {
    console.error(e);
  };

  recognition.onend = () => {
    recognition.start(); // auto restart
  };

  recognition.start();
}

// 🧠 COMMANDS
function handleCommand(command) {

  if (command.includes("youtube")) {
    speak("Opening YouTube");
    window.open("https://youtube.com", "_blank");
    return;
  }

  if (command.includes("google")) {
    speak("Opening Google");
    window.open("https://google.com", "_blank");
    return;
  }

  if (command.includes("spotify")) {
    speak("Opening Spotify");
    window.open("https://open.spotify.com", "_blank");
    return;
  }

  if (command.includes("time")) {
    const time = new Date().toLocaleTimeString();
    speak("The time is " + time);
    return;
  }

  if (command.includes("date")) {
    const date = new Date().toLocaleDateString();
    speak("Today is " + date);
    return;
  }

  if (command.includes("how are you")) {
    speak("I am functioning perfectly.");
    return;
  }

  speak("Command not recognized.");
}

// 🔊 VOICE FIX (important)
function speak(text) {

  speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);

  function setVoice() {
    const voices = speechSynthesis.getVoices();

    const voice =
      voices.find(v => v.name.includes("Google UK English Male")) ||
      voices.find(v => v.lang === "en-GB") ||
      voices[0];

    if (voice) speech.voice = voice;

    speech.pitch = 0.85;
    speech.rate = 0.95;

    speechSynthesis.speak(speech);
  }

  // Fix for Chrome voice loading bug
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = setVoice;
  } else {
    setVoice();
  }
}
</script>

</body>
</html>
